<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1536" width="1024" height="1536">
  <defs>
    <style>
      .ivory { fill:#fbf7ec; }
      .gm { fill:none; stroke:#1f7a3a; stroke-linecap:round; stroke-linejoin:round; }
      .gm-fill { fill:#1f7a3a; }
      .blue { fill:#1c4fa0; }
      .blueStroke { fill:none; stroke:#1c4fa0; }
      .red { fill:#c0392b; }
      .dark { fill:#2b2b2b; }
      .acc { fill:#7a1f12; }
      text { font-family:'Arial Black','Arial',sans-serif; font-weight:900; }
      .disp { letter-spacing:2px; }
    </style>
  </defs>

  <rect class="ivory" x="0" y="0" width="1024" height="1536"/>

  <!-- ===================== TITLE: YOUR GREMLIN (blue, boxed) ===================== -->
  <g>
    <!-- hand-drawn double box -->
    <path class="blueStroke" stroke-width="5"
      d="M44,40 L470,38 L472,118 L42,120 Z"/>
    <path class="blueStroke" stroke-width="2.5"
      d="M52,49 L462,47 L463,110 L50,112 Z"/>
    <text class="blue disp" x="68" y="98" font-size="52">YOUR GREMLIN</text>
  </g>

  <!-- ===================== LEFT TEXT BLOCK ===================== -->
  <g>
    <text class="blue" x="48" y="300" font-size="30">IS CURRENTLY ON</text>
    <text class="blue" x="48" y="338" font-size="30">A LOW DRAMA</text>
    <text class="blue" x="48" y="376" font-size="30">GREMLIN FEAST.</text>
  </g>

  <!-- ===================== RIGHT TEXT BLOCK ===================== -->
  <g>
    <text class="red" x="660" y="300" font-size="30">THE KING OR</text>
    <text class="red" x="660" y="338" font-size="30">QUEEN OF YOUR</text>
    <text class="red" x="660" y="376" font-size="30">UNDERWORLD.</text>
    <text class="red" x="660" y="448" font-size="30">AND IT OWNS</text>
    <text class="red" x="660" y="486" font-size="30">YOUR LIFE.</text>
  </g>

  <!-- ===================== TYPE 1 / TYPE 2 ===================== -->
  <g>
    <text class="blue" x="60" y="640" font-size="44">TYPE 1</text>
    <path class="blueStroke" stroke-width="3.5" stroke-linecap="round" d="M62,655 Q150,662 232,654"/>
    <text class="blue" x="60" y="730" font-size="44">TYPE 2</text>
    <path class="blueStroke" stroke-width="3.5" stroke-linecap="round" d="M62,745 Q150,752 232,744"/>
  </g>

  <!-- ===================== RIGHT-LOWER SMALL BLOCK ===================== -->
  <g>
    <text class="dark" x="700" y="820" font-size="24">GREMLIN</text>
    <text class="dark" x="700" y="850" font-size="24">TRANSFORMATION</text>
    <text class="dark" x="700" y="892" font-size="22">— PROLOGUE</text>
    <text class="dark" x="700" y="922" font-size="22">— CHAPTER 0</text>
    <text class="dark" x="700" y="952" font-size="22">— CHAPTER 1</text>
  </g>

  <!-- ============================================================= -->
  <!-- ======================  THE GREMLIN  ========================= -->
  <!-- Drawn large, centered. Green marker line work.                -->
  <!-- ============================================================= -->
  <g class="gm" stroke-width="4.5">

    <!-- ---- HORNS / spiky head crest (wiry, jittery) ---- -->
    <path d="M470,300 Q455,255 440,228 Q452,250 458,300"/>
    <path d="M455,295 Q438,250 448,210 Q452,248 470,298"/>
    <path d="M512,290 Q510,235 520,200 Q520,245 526,292"/>
    <path d="M540,300 Q560,250 588,222 Q566,248 556,300"/>
    <path d="M560,300 Q588,258 612,238 Q586,260 576,302"/>
    <!-- a couple of stray wiry hairs -->
    <path d="M498,292 Q495,250 505,222"/>
    <path d="M484,300 Q474,262 470,238"/>

    <!-- ---- HEAD: narrow, angular, gaunt skull ---- -->
    <path stroke-width="5" d="M452,300
      Q436,330 442,372
      Q448,412 470,448
      Q486,476 512,492
      Q540,476 556,448
      Q578,412 582,370
      Q586,330 570,300
      Q540,288 512,288
      Q482,288 452,300 Z"/>

    <!-- cheek hollows (gaunt) -->
    <path stroke-width="3" d="M452,372 Q462,392 480,402"/>
    <path stroke-width="3" d="M582,372 Q572,392 552,402"/>

    <!-- ---- BROW: angular, menacing ---- -->
    <path stroke-width="5" d="M452,352 Q478,332 502,350"/>
    <path stroke-width="5" d="M522,350 Q548,330 574,352"/>

