    <path stroke-width="4" d="M458,372 Q478,360 500,372 Q486,392 470,390 Q460,384 458,372 Z"/>
    <!-- right eye socket -->
    <path stroke-width="4" d="M524,372 Q546,360 566,372 Q558,390 542,392 Q528,388 524,372 Z"/>
