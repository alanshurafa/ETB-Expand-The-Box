    <path stroke-width="4" d="M308,806 Q296,840 286,872"/>
    <path stroke-width="4" d="M318,808 Q312,846 306,884"/>
    <path stroke-width="4" d="M330,806 Q330,846 330,886"/>
    <path stroke-width="4" d="M340,804 Q348,842 358,876"/>
