    <path stroke-width="2.5" d="M330,886 l-6,12 M330,886 l6,11"/>
    <path stroke-width="2.5" d="M358,876 l-3,13 M358,876 l8,8"/>

    <!-- ============ RIGHT ARM: wiry, long, with claw hand ============ -->
    <path stroke-width="5" d="M654,628
      Q694,666 712,720
      Q724,760 730,806"/>
    <path stroke-width="4" d="M644,636
      Q678,676 690,724
      Q698,762 702,804"/>
    <path stroke-width="3" d="M674,710 Q686,716 694,708"/>
    <!-- RIGHT CLAW HAND -->
    <path stroke-width="4" d="M730,806 Q742,840 752,872"/>
    <path stroke-width="4" d="M720,808 Q726,846 732,884"/>
    <path stroke-width="4" d="M708,806 Q708,846 708,886"/>
    <path stroke-width="4" d="M698,804 Q690,842 680,876"/>
    <path stroke-width="4" d="M732,808 Q752,820 764,840"/>
    <path stroke-width="2.5" d="M752,872 l8,10 M752,872 l-4,12"/>
    <path stroke-width="2.5" d="M732,884 l7,11 M732,884 l-5,11"/>
    <path stroke-width="2.5" d="M708,886 l6,12 M708,886 l-6,11"/>
    <path stroke-width="2.5" d="M680,876 l3,13 M680,876 l-8,8"/>

    <!-- ============ TORSO: ribbed / segmented, wiry not plump ============ -->
    <!-- torso outline: narrow waisted, slightly hunched -->
    <path stroke-width="5" d="M470,580
      Q436,640 432,720
      Q430,800 448,876
      Q478,912 512,916
      Q546,912 576,876
      Q594,800 592,720
      Q588,640 554,580"/>

    <!-- sternum line -->
    <path stroke-width="3" d="M512,600 Q510,660 512,720"/>

    <!-- RIBS / segments (angular chevrons, not smooth turtle bands) -->
    <path stroke-width="4" d="M452,648 Q482,636 512,640 Q542,636 572,648"/>
    <path stroke-width="4" d="M446,690 Q482,676 512,680 Q542,676 578,690"/>
    <path stroke-width="4" d="M442,734 Q482,720 512,724 Q542,720 582,734"/>
    <path stroke-width="4" d="M444,778 Q482,764 512,768 Q542,764 580,778"/>
    <path stroke-width="4" d="M450,822 Q484,810 512,814 Q540,810 574,822"/>
    <path stroke-width="4" d="M462,860 Q486,852 512,855 Q538,852 562,860"/>

    <!-- short rib ticks branching off the sternum (wiry detail) -->
    <path stroke-width="2.5" d="M512,664 l-22,-8 M512,664 l22,-8"/>
    <path stroke-width="2.5" d="M512,708 l-26,-6 M512,708 l26,-6"/>
    <path stroke-width="2.5" d="M512,752 l-26,-6 M512,752 l26,-6"/>
    <path stroke-width="2.5" d="M512,796 l-24,-6 M512,796 l24,-6"/>

    <!-- navel knot -->
    <path stroke-width="3" d="M506,838 q6,8 12,0"/>

    <!-- ============ LEGS + CLAWED FEET (splayed) ============ -->
    <!-- left leg -->
    <path stroke-width="5" d="M470,910 Q452,990 444,1070 Q440,1110 446,1140"/>
    <path stroke-width="4" d="M492,914 Q484,994 484,1074 Q484,1112 490,1142"/>
    <!-- left foot claws -->
    <path stroke-width="4" d="M446,1140 Q420,1156 398,1170"/>
    <path stroke-width="4" d="M448,1142 Q436,1168 426,1190"/>
    <path stroke-width="4" d="M462,1142 Q464,1170 470,1196"/>
    <path stroke-width="4" d="M488,1142 Q500,1166 514,1186"/>
    <path stroke-width="2.5" d="M398,1170 l-9,9 M426,1190 l-4,11 M470,1196 l3,11 M514,1186 l9,7"/>

    <!-- right leg -->
    <path stroke-width="5" d="M554,910 Q572,990 580,1070 Q584,1110 578,1140"/>
    <path stroke-width="4" d="M532,914 Q540,994 540,1074 Q540,1112 534,1142"/>
    <!-- right foot claws -->
    <path stroke-width="4" d="M578,1140 Q604,1156 626,1170"/>
    <path stroke-width="4" d="M576,1142 Q588,1168 598,1190"/>
    <path stroke-width="4" d="M562,1142 Q560,1170 554,1196"/>
    <path stroke-width="4" d="M536,1142 Q524,1166 510,1186"/>
    <path stroke-width="2.5" d="M626,1170 l9,9 M598,1190 l4,11 M554,1196 l-3,11 M510,1186 l-9,7"/>

    <!-- a wiry pointed tail flick peeking behind a leg -->
    <path stroke-width="4" d="M576,940 Q620,980 640,1030 Q650,1058 642,1086"/>
    <path stroke-width="2.5" d="M642,1086 l10,8 M642,1086 l-2,12"/>

  </g>
</svg>
