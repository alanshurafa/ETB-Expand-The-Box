    <circle class="gm-fill" cx="480" cy="376" r="5.5" stroke="none"/>
    <circle class="gm-fill" cx="544" cy="376" r="5.5" stroke="none"/>
    <!-- red rim accents under eyes -->
    <path stroke="#7a1f12" stroke-width="3" d="M462,392 Q480,400 498,392"/>
    <path stroke="#7a1f12" stroke-width="3" d="M526,392 Q544,400 562,392"/>

    <!-- ---- NOSE: thin pointed snout ---- -->
    <path stroke-width="3.5" d="M510,388 Q505,418 500,438 Q510,446 522,438 Q518,418 514,388"/>
    <path stroke-width="2.5" d="M502,440 Q500,448 506,450"/>
    <path stroke-width="2.5" d="M522,440 Q524,448 518,450"/>

    <!-- ---- GRIN: wide toothy menacing mouth ---- -->
    <path stroke-width="5" d="M456,452 Q512,470 568,452"/>
    <path stroke-width="5" d="M460,452 Q512,510 564,452"/>
    <!-- teeth (jagged) -->
    <path stroke-width="2.5" d="M474,456 L482,478 L490,457"/>
    <path stroke-width="2.5" d="M492,458 L500,482 L508,458"/>
    <path stroke-width="2.5" d="M510,458 L518,483 L526,458"/>
    <path stroke-width="2.5" d="M528,458 L536,481 L544,457"/>
    <path stroke-width="2.5" d="M546,456 L552,475 L558,455"/>

    <!-- ---- NECK: scrawny, long, sinewy ---- -->
    <path stroke-width="5" d="M482,492 Q478,540 488,584"/>
    <path stroke-width="5" d="M548,492 Q552,540 544,584"/>
    <!-- adam's apple / throat ridges -->
    <path stroke-width="2.5" d="M500,520 Q512,528 526,520"/>
    <path stroke-width="2.5" d="M498,548 Q512,556 530,548"/>
    <!-- ragged collar of skin -->
    <path stroke-width="3" d="M470,580 Q512,600 560,580"/>

    <!-- ---- SHOULDERS: bony, hunched ---- -->
    <path stroke-width="5" d="M488,584 Q430,596 382,628"/>
    <path stroke-width="5" d="M544,584 Q604,596 654,628"/>

    <!-- ============ LEFT ARM: wiry, long, with claw hand ============ -->
    <path stroke-width="5" d="M382,628
      Q344,666 326,720
      Q314,760 308,806"/>
    <path stroke-width="4" d="M392,636
      Q360,676 348,724
      Q340,762 336,804"/>
    <!-- elbow knob -->
    <path stroke-width="3" d="M344,710 Q356,716 364,708"/>
